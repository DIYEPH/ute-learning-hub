# Production with Self-hosted SQL Server 
# Lightweight deployment - No Redis, No Kafka

services:
  # SQL Server Database
  sqlserver:
    restart: always
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_SA_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    restart: always
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Microsoft__ClientId: ${MICROSOFT_CLIENT_ID}
      Microsoft__TenantId: ${MICROSOFT_TENANT_ID}
      Microsoft__ClientSecret: ${MICROSOFT_CLIENT_SECRET}
      # AWS S3
      AWS__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      AWS__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      AWS__Region: ${AWS_REGION}
      AWS__S3BucketName: ${AWS_S3_BUCKET_NAME}
      AWS__S3BaseUrl: ${AWS_S3_BASE_URL}
      # Email
      Email__SmtpServer: ${SMTP_SERVER}
      Email__SmtpPort: ${SMTP_PORT}
      Email__SmtpUsername: ${SMTP_USERNAME}
      Email__SmtpPassword: ${SMTP_PASSWORD}
      Email__EnableSsl: ${SMTP_ENABLE_SSL}
      Email__FromEmail: ${FROM_EMAIL}
      Email__FromName: ${FROM_NAME}
      Email__BaseUrl: ${PUBLIC_URL}
      # File Storage
      FileStorage__BaseUrl: ${AWS_S3_BASE_URL}
      Recommendation__AiServiceBaseUrl: "http://ai:8000"
      Redis__ConnectionString: ""

  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID}
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
    depends_on:
      backend:
        condition: service_started

  ai:
    restart: always

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"

volumes:
  sqlserver-data:
